name: "vrofile-ias"
on:
  push:
     branches: 
        - main
        - stage
     paths: 
        - terraform/**
  pull_request:
     branches: 
        - main 
     paths: 
       - terraform/**
env:
   AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
   AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
   BUCKET_TF_STATE: ${{secrets.BUCKET_TF_STATE}}
   AWS_REGION: ap-south-1
   EKS_CLUSTER : kitops-eks-cluster

jobs: 
   terraform: 
      name: "Apply terraform code changes "
      runs-on: ubuntu-latest
      defaults:
         run:
            shell: bash
            working-directory: ./terraform
      steps:
         - name: checkout source code 
           uses: actions/checkout@v6
         
         - name: steup terraform with spacefic version on the runner 
           uses: hashicorp/setup-terraform@v4
           with:
                terraform_version: 1.6.3

         - name: Terraform init
           id: init 
           run: terraform init -backend-config="bucket=$BUCKET_TF_STATE" -backend-config="region=$AWS_REGION"

         - name: Terraform fmt 
           id: fmt 
           run: terraform fmt -check
         
         - name: Terraform validate
           id : validate
           run: terraform validate

         - name: Terraform plan
           id : plan 
           run: terraform plan -no-color -input=false -parallelism=1 -out=planfile
           continue-on-error: true

         - name: delete terraform
           run: terraform destroy -auto-approve 
